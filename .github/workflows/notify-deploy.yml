name: Notify backend repo of app changes

on:
  push:
    branches: [main]
    paths:
      - "app/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger textory deploy
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.TEXTORY_DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/gasserp/textory/dispatches \
            -d '{"event_type":"app-updated"}'
