name: Apple Release

on:
  push:
    tags:
      - apple-v*

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          if [ -z "${MACOS_CERTIFICATE_P12:-}" ]; then
            echo "::error::MACOS_CERTIFICATE_P12 secret is empty or unset" >&2
            exit 1
          fi

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          # Verify the .p12 actually contains a private key before importing.
          if ! openssl pkcs12 -in "$CERT_PATH" -nokeys -passin pass:"$MACOS_CERTIFICATE_PASSWORD" -legacy >/dev/null 2>&1 \
            && ! openssl pkcs12 -in "$CERT_PATH" -nokeys -passin pass:"$MACOS_CERTIFICATE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Could not read the .p12 — check that MACOS_CERTIFICATE_P12 is valid base64 and MACOS_CERTIFICATE_PASSWORD is correct" >&2
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the new keychain to the search list before importing so later
          # queries (set-key-partition-list, codesign) can find the identity.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Fail early with a clear message if no signing identity is present.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID\|Apple Develop"; then
            echo "::error::No code-signing identity found after import — the .p12 likely has no private key" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2 || true
            exit 1
          fi

      - name: Build unsigned macOS app
        run: |
          xcodebuild -project apple/Textory/Textory.xcodeproj -scheme Textory -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Sign macOS app
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --entitlements apple/Textory/Textory/Textory.entitlements \
            --sign "$MACOS_SIGNING_IDENTITY" \
            build/Build/Products/Release/Textory.app
          codesign --verify --strict --verbose=2 build/Build/Products/Release/Textory.app

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent Textory.app Textory-notarize.zip
          xcrun notarytool submit Textory-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple Textory.app

      - name: Zip macOS app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent Textory.app "$GITHUB_WORKSPACE/Textory-macOS.zip"

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" Textory-macOS.zip --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail

          # apple-v1.2.3 -> 1.2.3
          VERSION="${GITHUB_REF_NAME#apple-v}"
          SHA="$(shasum -a 256 Textory-macOS.zip | awk '{print $1}')"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/gasserp/homebrew-tap.git" tap
          cd tap

          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/textory.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/textory.rb

          if git diff --quiet; then
            echo "Cask already up to date for ${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "textory ${VERSION}"
          git push
