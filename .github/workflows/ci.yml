name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type-check app
        run: npm run check -w app

      - name: Build app
        run: npm run build -w app

  validate-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v4
        with:
          go-version-file: cli/go.mod

      - name: Run vet
        run: go vet ./...
        working-directory: cli

      - name: Run tests
        run: go test ./...
        working-directory: cli
